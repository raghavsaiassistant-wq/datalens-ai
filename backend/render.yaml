services:
  - type: web
    name: datalens-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: MAX_FILE_SIZE_MB
        value: 25
